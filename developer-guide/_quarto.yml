project:
  type: book
  output-dir: _output

book:
  title: "Pi Developer Architecture Guide"
  subtitle: "A source-grounded path from first contribution to extension authoring"
  author: "Pi maintainers"
  date: today
  chapters:
    - index.qmd
    - part: "Start here"
      chapters:
        - 01-typescript-for-pi.qmd
    - part: "Using Pi effectively"
      chapters:
        - 20-sessions-trees-compaction.qmd
        - 21-customizing-pi.qmd
    - part: "How Pi works"
      chapters:
        - 22-architecture-for-extensions.qmd
        - 23-lifecycle-and-hooks.qmd
    - part: "Building extensions"
      chapters:
        - 24-your-first-extension.qmd
        - 25-extension-patterns.qmd
        - 26-packaging-and-distribution.qmd
    - part: "Subsystem deep dives"
      chapters:
        - 08-built-in-tools.qmd
        - 10-agent-core.qmd
        - 09-models-providers-and-auth.qmd
        - 11-tui-and-interactive-mode.qmd
        - 15-modes-sdk-and-operations.qmd
    - part: "Practice and reference"
      chapters:
        - 12-testing-debugging-and-contribution.qmd
        - 13-guided-source-tours.qmd
        - 14-extension-event-reference.qmd
        - 16-failure-and-recovery-reference.qmd
        - glossary.qmd
  appendices:
    - 17-typescript-foundations-workbook.qmd

format:
  pdf:
    pdf-engine: xelatex
    documentclass: scrreprt
    classoption: openany
    geometry:
      - margin=0.9in
    colorlinks: true
    toc: true
    number-sections: true
    code-overflow: wrap
    keep-tex: false

execute:
  freeze: auto
