project:
  type: book
  output-dir: _output

book:
  title: "Pi Developer Architecture Guide"
  subtitle: "A source-grounded path from first contribution to extension authoring"
  author: "Pi maintainers"
  date: today
  chapters:
    - index.qmd
    - 01-typescript-for-pi.qmd
    - 02-architecture.qmd
    - 03-prompt-lifecycle.qmd
    - 04-extensions.qmd
    - 05-customization-and-workflow.qmd
    - 06-sessions-and-context.qmd
    - 07-resources-settings-and-trust.qmd
    - 08-built-in-tools.qmd
    - 09-models-providers-and-auth.qmd
    - 10-agent-core.qmd
    - 11-tui-and-interactive-mode.qmd
    - 12-testing-debugging-and-contribution.qmd
    - 13-guided-source-tours.qmd
    - 14-extension-event-reference.qmd
    - 15-modes-sdk-and-operations.qmd
    - 16-failure-and-recovery-reference.qmd
    - glossary.qmd

format:
  pdf:
    documentclass: scrreprt
    classoption: openany
    geometry:
      - margin=0.9in
    colorlinks: true
    toc: true
    number-sections: true
    code-overflow: wrap
    keep-tex: false

execute:
  freeze: auto
