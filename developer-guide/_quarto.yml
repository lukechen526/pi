project:
  type: book
  output-dir: _output

book:
  title: "Pi Developer Architecture Guide"
  subtitle: "A source-grounded path from first contribution to extension authoring"
  author: "Pi maintainers"
  date: today
  chapters:
    - index.qmd
    - part: "Start here"
      chapters:
        - 01-typescript-for-pi.qmd
    - part: "Using Pi effectively"
      chapters:
        - 02-using-pi-day-to-day.qmd
        - 03-sessions-trees-compaction.qmd
        - 04-customizing-pi.qmd
    - part: "How Pi works"
      chapters:
        - 05-architecture-for-extensions.qmd
        - 06-lifecycle-and-hooks.qmd
    - part: "Building extensions"
      chapters:
        - 07-your-first-extension.qmd
        - 08-extension-patterns.qmd
        - 09-packaging-and-distribution.qmd
    - part: "Subsystem deep dives"
      chapters:
        - 10-built-in-tools.qmd
        - 11-models-providers-and-auth.qmd
        - 12-agent-core.qmd
        - 13-tui-and-interactive-mode.qmd
        - 14-modes-sdk-and-operations.qmd
    - part: "Practice and reference"
      chapters:
        - 15-testing-debugging-and-contribution.qmd
        - 16-guided-source-tours.qmd
        - 17-extension-event-reference.qmd
        - 18-failure-and-recovery-reference.qmd
        - 19-glossary.qmd
  appendices:
    - A1-typescript-foundations-workbook.qmd

format:
  pdf:
    pdf-engine: xelatex
    documentclass: scrreprt
    classoption: openany
    geometry:
      - margin=0.9in
    colorlinks: true
    toc: true
    number-sections: true
    code-overflow: wrap
    keep-tex: false

execute:
  freeze: auto
